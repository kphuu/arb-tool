<!DOCTYPE html>
<html>
<head>
  <title>Arb Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f0f0f; color: white; padding: 20px; }
    h1 { color: #00ff88; font-size: 28px; margin-bottom: 4px; }
    .subtitle { color: #666; margin-bottom: 20px; font-size: 14px; }
    .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    button { background: #00ff88; color: black; border: none; padding: 12px 24px; font-size: 15px; cursor: pointer; border-radius: 6px; font-weight: bold; }
    button:hover { background: #00cc6a; }
    .summary { font-size: 16px; color: #aaa; margin-bottom: 20px; }
    .summary span { color: #00ff88; font-weight: bold; }
    .sport-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 8px; }
    .tag-mlb { background: #1a3a1a; color: #00ff88; }
    .tag-nba { background: #1a1a3a; color: #4488ff; }
    .tag-nhl { background: #1a2a3a; color: #00aaff; }
    .tag-nfl { background: #2a1a2a; color: #ff44ff; }
    .arb-card { background: #1a1a1a; border: 2px solid #00ff88; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .ev-card { background: #1a1a00; border: 2px solid #ffcc00; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .no-arb { background: #141414; border: 1px solid #222; border-radius: 10px; padding: 16px; margin-bottom: 10px; }
    .game-title { font-size: 17px; font-weight: bold; margin-bottom: 10px; color: white; }
    .roi-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
    .roi { font-size: 26px; color: #00ff88; font-weight: bold; }
    .ev-label { font-size: 20px; color: #ffcc00; font-weight: bold; }
    .roi-bar-bg { flex: 1; background: #222; border-radius: 4px; height: 8px; }
    .roi-bar { background: #00ff88; height: 8px; border-radius: 4px; }
    .ev-bar { background: #ffcc00; height: 8px; border-radius: 4px; }
    .bet-row { margin: 8px 0; color: #ccc; font-size: 15px; }
    .book { color: #00aaff; font-weight: bold; }
    .odds { color: #ffaa00; font-weight: bold; }
    .stake { color: #00ff88; font-weight: bold; }
    .pinnacle-row { margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; color: #888; font-size: 13px; }
    .sharp { color: #ff6644; font-weight: bold; }
    .ev-positive { color: #ffcc00; font-weight: bold; }
    .section-title { color: #555; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin: 24px 0 12px; }
    #countdown { color: #444; font-size: 13px; margin-left: 8px; }
    .no-arb-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .no-arb-odds { font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <h1>⚡ Arb Scanner</h1>
  <p class="subtitle">Pregame arbitrage + Pinnacle sharp line comparison — MLB, NBA, NHL, NFL</p>

  <div class="controls">
    <button onclick="loadOdds()">🔍 Scan Now</button>
    <span id="countdown"></span>
  </div>

  <div class="summary" id="summary"></div>
  <div id="output"></div>

  <script>
    let countdown = 60;
    let timer;

    function toDecimal(american) {
      if (american > 0) return (american / 100) + 1;
      return (100 / Math.abs(american)) + 1;
    }

    function toAmerican(decimal) {
      if (decimal >= 2) return '+' + Math.round((decimal - 1) * 100);
      return Math.round(-100 / (decimal - 1)).toString();
    }

    function getSportTag(key) {
      if (!key) return '';
      if (key.includes('baseball')) return '<span class="sport-tag tag-mlb">⚾ MLB</span>';
      if (key.includes('basketball')) return '<span class="sport-tag tag-nba">🏀 NBA</span>';
      if (key.includes('hockey')) return '<span class="sport-tag tag-nhl">🏒 NHL</span>';
      if (key.includes('football')) return '<span class="sport-tag tag-nfl">🏈 NFL</span>';
      return '';
    }

    function removeVig(pinnHome, pinnAway) {
      const impHome = 1 / toDecimal(pinnHome);
      const impAway = 1 / toDecimal(pinnAway);
      const total = impHome + impAway;
      return {
        fairHome: impHome / total,
        fairAway: impAway / total
      };
    }

    function findArbs(games) {
      const ALLOWED_BOOKS = ['DraftKings', 'FanDuel', 'BetMGM', 'BetRivers', 'Caesars', 'Fanatics'];
      const results = [];

      for (const game of games) {
        let bestHome = { price: -99999, book: '' };
        let bestAway = { price: -99999, book: '' };
        let pinnHome = null;
        let pinnAway = null;

        for (const bookmaker of game.bookmakers) {
          const outcomes = bookmaker.markets[0].outcomes;

          // Grab Pinnacle separately as sharp reference
          if (bookmaker.key === 'pinnacle') {
            for (const o of outcomes) {
              if (o.name === game.home_team) pinnHome = o.price;
              if (o.name === game.away_team) pinnAway = o.price;
            }
            continue;
          }

          if (!ALLOWED_BOOKS.includes(bookmaker.title)) continue;

          for (const outcome of outcomes) {
            if (outcome.name === game.home_team && outcome.price > bestHome.price)
              bestHome = { price: outcome.price, book: bookmaker.title };
            if (outcome.name === game.away_team && outcome.price > bestAway.price)
              bestAway = { price: outcome.price, book: bookmaker.title };
          }
        }

        if (!bestHome.book || !bestAway.book) continue;

        const impliedHome = 1 / toDecimal(bestHome.price);
        const impliedAway = 1 / toDecimal(bestAway.price);
        const total = impliedHome + impliedAway;
        const roi = ((1 / total) - 1) * 100;
        const stakeHome = (impliedHome / total) * 100;
        const stakeAway = (impliedAway / total) * 100;

        // +EV vs Pinnacle
        let evHome = null, evAway = null;
        let fairHome = null, fairAway = null;
        if (pinnHome && pinnAway) {
          const fair = removeVig(pinnHome, pinnAway);
          fairHome = fair.fairHome;
          fairAway = fair.fairAway;
          evHome = (fairHome * (toDecimal(bestHome.price) - 1) - (1 - fairHome)) * 100;
          evAway = (fairAway * (toDecimal(bestAway.price) - 1) - (1 - fairAway)) * 100;
        }

        const isArb = total < 1 && bestHome.book !== bestAway.book && roi < 5;
        const isEvHome = evHome !== null && evHome > 2;
        const isEvAway = evAway !== null && evAway > 2;

        results.push({
          game: `${game.away_team} @ ${game.home_team}`,
          sport: game.sport_key,
          isArb, isEvHome, isEvAway,
          roi: roi,
          roiDisplay: roi.toFixed(2),
          evHome: evHome ? evHome.toFixed(1) : null,
          evAway: evAway ? evAway.toFixed(1) : null,
          pinnHome, pinnAway,
          fairHome: fairHome ? (fairHome * 100).toFixed(1) : null,
          fairAway: fairAway ? (fairAway * 100).toFixed(1) : null,
          home: { team: game.home_team, ...bestHome, stake: stakeHome.toFixed(2) },
          away: { team: game.away_team, ...bestAway, stake: stakeAway.toFixed(2) }
        });
      }

      return results.sort((a, b) => {
        if (a.isArb && !b.isArb) return -1;
        if (!a.isArb && b.isArb) return 1;
        return b.roi - a.roi;
      });
    }

    function startCountdown() {
      clearInterval(timer);
      countdown = 60;
      timer = setInterval(() => {
        countdown--;
        document.getElementById('countdown').textContent = `Auto-refresh in ${countdown}s`;
        if (countdown <= 0) loadOdds();
      }, 1000);
    }

    async function loadOdds() {
      document.getElementById('summary').innerHTML = '<span style="color:#555">Scanning all sports...</span>';
      document.getElementById('output').innerHTML = '';
      startCountdown();

      const res = await fetch('/api/odds');
      const data = await res.json();
      const results = findArbs(data);
      const arbs = results.filter(r => r.isArb);
      const evPlays = results.filter(r => !r.isArb && (r.isEvHome || r.isEvAway));
      const rest = results.filter(r => !r.isArb && !r.isEvHome && !r.isEvAway);

      document.getElementById('summary').innerHTML =
        `<span>${arbs.length} arb${arbs.length !== 1 ? 's' : ''}</span> &nbsp;|&nbsp; <span style="color:#ffcc00">${evPlays.length} +EV plays</span> &nbsp;|&nbsp; ${results.length} total games`;

      let html = '';

      if (arbs.length > 0) {
        html += '<div class="section-title">✅ Arbitrage Opportunities</div>';
        for (const r of arbs) {
          html += `
            <div class="arb-card">
              ${getSportTag(r.sport)}
              <div class="game-title">${r.game}</div>
              <div class="roi-row">
                <div class="roi">+${r.roiDisplay}% ROI</div>
                <div class="roi-bar-bg"><div class="roi-bar" style="width:${Math.min(r.roi*20,100)}%"></div></div>
              </div>
              <div class="bet-row">Bet <span class="stake">$${r.away.stake}</span> on <span class="book">${r.away.book}</span> — ${r.away.team} at <span class="odds">${r.away.price > 0 ? '+' : ''}${r.away.price}</span></div>
              <div class="bet-row">Bet <span class="stake">$${r.home.stake}</span> on <span class="book">${r.home.book}</span> — ${r.home.team} at <span class="odds">${r.home.price > 0 ? '+' : ''}${r.home.price}</span></div>
              ${r.pinnHome ? `<div class="pinnacle-row">📌 Pinnacle: ${r.away.team} <span class="sharp">${r.pinnAway > 0 ? '+' : ''}${r.pinnAway}</span> | ${r.home.team} <span class="sharp">${r.pinnHome > 0 ? '+' : ''}${r.pinnHome}</span></div>` : ''}
            </div>`;
        }
      }

      if (evPlays.length > 0) {
        html += '<div class="section-title">💰 +EV vs Pinnacle Sharp Line</div>';
        for (const r of evPlays) {
          html += `<div class="ev-card">
            ${getSportTag(r.sport)}
            <div class="game-title">${r.game}</div>`;
          if (r.isEvAway) {
            html += `<div class="bet-row">✅ <span class="ev-positive">+${r.evAway}% EV</span> — Bet ${r.away.team} at <span class="book">${r.away.book}</span> <span class="odds">${r.away.price > 0 ? '+' : ''}${r.away.price}</span> (fair: ${r.fairAway}%)</div>`;
          }
          if (r.isEvHome) {
            html += `<div class="bet-row">✅ <span class="ev-positive">+${r.evHome}% EV</span> — Bet ${r.home.team} at <span class="book">${r.home.book}</span> <span class="odds">${r.home.price > 0 ? '+' : ''}${r.home.price}</span> (fair: ${r.fairHome}%)</div>`;
          }
          html += `<div class="pinnacle-row">📌 Pinnacle: ${r.away.team} <span class="sharp">${r.pinnAway > 0 ? '+' : ''}${r.pinnAway}</span> | ${r.home.team} <span class="sharp">${r.pinnHome > 0 ? '+' : ''}${r.pinnHome}</span></div>
          </div>`;
        }
      }

      html += '<div class="section-title">📋 All Other Games</div>';
      for (const r of rest) {
        html += `
          <div class="no-arb">
            <div class="no-arb-inner">
              <span>${getSportTag(r.sport)} <span style="color:#777">${r.game}</span></span>
              <span class="no-arb-odds">
                ${r.away.team} <span class="odds">${r.away.price > 0 ? '+' : ''}${r.away.price}</span> @ <span class="book">${r.away.book}</span>
                &nbsp;|&nbsp;
                ${r.home.team} <span class="odds">${r.home.price > 0 ? '+' : ''}${r.home.price}</span> @ <span class="book">${r.home.book}</span>
                ${r.pinnHome ? `&nbsp;| 📌 <span class="sharp">${r.pinnAway > 0 ? '+' : ''}${r.pinnAway} / ${r.pinnHome > 0 ? '+' : ''}${r.pinnHome}</span>` : ''}
              </span>
            </div>
          </div>`;
      }

      document.getElementById('output').innerHTML = html;
    }

    loadOdds();
  </script>
</body>
</html>
